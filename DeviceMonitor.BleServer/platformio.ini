; DeviceMonitor.BleServer — Waveshare ESP32-C6-LCD-1.47
; BLE peripheral / GATT server: receives 6-byte metrics frames and shows them on the LCD.
;
; The official platform-espressif32 does not provide Arduino support for the ESP32-C6,
; so we use the community pioarduino fork (arduino-esp32 3.x / ESP-IDF 5.x).

[env:esp32-c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200

; ESP32-C6 has a native USB-Serial/JTAG; route Serial over USB CDC.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    moononournation/GFX Library for Arduino
